version: '3.9'

services:
  db:
    image: postgres:15
    container_name: fashion_shop_db
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-postgres}
      - POSTGRES_DB=${DB_NAME:-fashion_shop_db}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fashion_network
    env_file:
      - .env

  web:
    build: .
    container_name: fashion_shop_web
    restart: always
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
      - static_volume:/app/static
      - media_volume:/app/media
    ports:
      - "8000:8000"
    environment:
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_HOST=db
      - DB_PORT=${DB_PORT}
      - DEBUG=${DEBUG}
      - SECRET_KEY=${SECRET_KEY}
      - FRONTEND_URL=${FRONTEND_URL}
      - EMAIL_BACKEND=${EMAIL_BACKEND}
      - EMAIL_HOST_USER=${EMAIL_HOST_USER}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - fashion_network
    env_file:
      - .env

  adminer:
    image: adminer:latest
    container_name: fashion_shop_adminer
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - db
    networks:
      - fashion_network

volumes:
  postgres_data:
  static_volume:
  media_volume:

networks:
  fashion_network:
    driver: bridge