version: '3.9'

services:
  db:
    image: postgres:15
    container_name: fashion_shop_db
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-postgres}
      - POSTGRES_DB=${DB_NAME:-fashion_shop_db}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fashion_network

  web:
    build: .
    container_name: fashion_shop_web
    restart: always
    volumes:
      - .:/app
      - static_volume:/app/static
      - media_volume:/app/media
    ports:
      - "8000:8000"
    environment:
      - DB_NAME=${DB_NAME:-fashion_shop_db}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_HOST=db
      - DB_PORT=5432
      - DEBUG=${DEBUG:-True}
      - SECRET_KEY=${SECRET_KEY:-django-insecure-docker-dev-key}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - fashion_network

  adminer:
    image: adminer:latest
    container_name: fashion_shop_adminer
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - db
    networks:
      - fashion_network

volumes:
  postgres_data:
  static_volume:
  media_volume:

networks:
  fashion_network:
    driver: bridge